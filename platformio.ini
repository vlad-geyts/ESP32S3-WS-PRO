; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1-n16r8v]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = arduino

; Optimization: Set CPU frequency to max (240MHz)
board_build.f_cpu = 240000000L

; Flash & RAM settings for WROOM-1 (OPI PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags:
build_unflags =
     -std=gnu++11    
    ; Is a command-line flag used with GCC (GNU Compiler Collection), 
    ; spacially the g++ compiler, to enable the C++11 language 
    ; standard plus e set on non-standard GNU extentions that may 
    ; potentially contradict the standard.

build_flags =
    -std=gnu++17
    ; Enables the C++17 standard while alaso providing access to extra
    ; functionality offered by the GNO compiler

    ; Set these to 0 to use the CH343 UART Bridge (COM17)
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
    ; to enable PSRAM access in code
    -D BOARD_HAS_PSRAM 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    adafruit/Adafruit SSD1351 library @ ^1.3.2
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit BusIO @ ^1.17.0


